function renderHealthCard() {
  const todayKey = fmtKey(new Date());
  const wr = getWeekRange(new Date());

  // ── 오늘 권장칼로리 달성 ──
  let html = '<div class="card" style="margin-top:0">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html += '<div style="font-size:13px;font-weight:700;color:var(--muted)">🎯 오늘 권장칼로리 달성</div>';
  if (view !== "all") {
    html += '<button onclick="openMyProfile()" style="border:none;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:800;padding:5px 10px;border-radius:8px">내 정보 설정</button>';
  }
  html += '</div>';
  const rows = members.map(m => {
    const profile = getMyProfile(m.name);
    const todayEntries = entries.filter(e => e.member === m.name && e.date === todayKey);
    const todayKcal = todayEntries.reduce((s,e) => s + e.calories, 0);
    const todayBurned = exercises.filter(e => e.member === m.name && e.date === todayKey).reduce((s,e) => s + e.burned, 0);
    const netKcal = todayKcal - todayBurned;
    const tdee = profile ? calcTDEE(profile) : null;
    return { name: m.name, netKcal, tdee, todayKcal, todayBurned, hasRecord: todayEntries.length > 0 };
  });
  const ranked = rows.filter(r => r.tdee && r.hasRecord).map(r => {
    const diff = r.netKcal - r.tdee;
    const pct = Math.round(r.netKcal / r.tdee * 100);
    return { ...r, diff, pct };
  }).sort((a,b) => Math.abs(a.diff) - Math.abs(b.diff));
  if (ranked.length === 0) {
    html += '<div style="text-align:center;padding:16px;color:var(--faint);font-size:13px">내 이름 선택 후 "내 정보 설정"을 눌러주세요</div>';
  } else {
    const medals = ['🥇','🥈','🥉'];
    ranked.forEach((r, i) => {
      const medal = medals[i] || (i+1) + '위';
      const isGood = Math.abs(r.diff) <= 200;
      const isOver = r.diff > 200;
      const statusColor = isGood ? '#4CAF50' : isOver ? '#E0726A' : '#FF9800';
      const statusText = isGood ? '✅ 딱 좋아요!' : isOver ? '⚠️ +' + r.diff.toLocaleString() + ' kcal' : '📉 ' + r.diff.toLocaleString() + ' kcal';
      html += '<div style="margin-bottom:14px">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">' +
        '<span style="font-size:14px;font-weight:700">' + medal + ' ' + esc(r.name) + '</span>' +
        '<span style="font-size:12px;font-weight:700;color:' + statusColor + '">' + statusText + '</span></div>';
      html += '<div style="height:8px;background:var(--bg);border-radius:99px;overflow:hidden">' +
        '<div style="height:100%;width:' + Math.min(r.pct,100) + '%;background:' + statusColor + ';border-radius:99px"></div></div>';
      html += '<div style="display:flex;justify-content:space-between;margin-top:3px">' +
        '<span style="font-size:11px;color:var(--muted)">달성률 ' + r.pct + '%</span>' +
        (r.todayBurned > 0 ? '<span style="font-size:11px;color:#4CAF50">운동 -' + r.todayBurned.toLocaleString() + ' kcal</span>' : '') +
        '</div>';
      html += '</div>';
    });
  }
  const unset = rows.filter(r => !r.tdee);
  if (unset.length > 0) {
    html += '<div style="margin-top:8px;padding-top:10px;border-top:1px solid var(--line)">';
    unset.forEach(r => {
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0">' +
        '<span style="font-size:13px;font-weight:700;color:var(--faint)">' + esc(r.name) + '</span>' +
        '<span style="font-size:12px;color:var(--faint)">정보 미설정</span></div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // ── 이번 주 건강 다이어트 랭킹 ──
  // 점수 계산: 날짜별 달성률 80~110% → 10점 / 운동한 날 +3점 / 기록 안 한 날 0점
  const healthRanked = members.map(m => {
    const profile = getMyProfile(m.name);
    if (!profile) return { name: m.name, score: null, scoreDays: 0, exDays: 0 };
    const tdee = calcTDEE(profile);
    // 이번 주 날짜 목록 (오늘 포함 7일)
    const weekDays = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      weekDays.push(fmtKey(d));
    }
    let score = 0;
    let scoreDays = 0;
    weekDays.forEach(d => {
      const dayEntries = entries.filter(e => e.member === m.name && e.date === d);
      const dayKcal = dayEntries.reduce((s,e) => s + e.calories, 0);
      if (dayKcal === 0) return; // 기록 없으면 0점
      const dayBurned = exercises.filter(e => e.member === m.name && e.date === d).reduce((s,e) => s + e.burned, 0);
      const netKcal = dayKcal - dayBurned;
      const pct = netKcal / tdee * 100;
      // 달성률에 따른 점수
      if (pct >= 80 && pct <= 110) score += 10;       // 딱 좋아요
      else if (pct >= 70 && pct < 80) score += 7;     // 조금 부족
      else if (pct > 110 && pct <= 130) score += 5;   // 조금 초과
      else if (pct > 130) score += 2;                  // 많이 초과
      else score += 4;                                  // 많이 부족
      // 운동 보너스
      if (dayBurned > 0) score += 3;
      scoreDays++;
    });
    const exDays = [...new Set(exercises.filter(e => e.member === m.name && weekDays.includes(e.date)).map(e => e.date))].length;
    return { name: m.name, score, scoreDays, exDays };
  }).filter(m => m.score !== null && m.scoreDays > 0).sort((a,b) => b.score - a.score);

  if (healthRanked.length > 0) {
    const maxScore = Math.max(...healthRanked.map(m => m.score));
    const hMedals = ['🥇','🥈','🥉'];
    html += '<div class="card" style="margin-top:0">';
    html += '<div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:4px">💚 이번 주 건강 다이어트 랭킹</div>';
    html += '<div style="font-size:11px;color:var(--faint);margin-bottom:12px">권장칼로리 80~110% 달성 +10점 · 운동 +3점</div>';
    html += '<div style="display:flex;flex-direction:column;gap:10px">';
    healthRanked.forEach((m, i) => {
      const pct = maxScore > 0 ? Math.round(m.score / maxScore * 100) : 0;
      const medal = hMedals[i] || (i+1) + '위';
      html += '<div>';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">' +
        '<div><span style="font-size:14px;font-weight:700">' + medal + ' ' + esc(m.name) + '</span>' +
        '<span style="font-size:11px;color:var(--muted);margin-left:6px">' + m.scoreDays + '일 기록 · 운동 ' + m.exDays + '일</span></div>' +
        '<span style="font-size:14px;font-weight:800;color:#4CAF50">' + m.score + '점</span></div>';
      html += '<div style="height:7px;background:var(--bg);border-radius:99px;overflow:hidden">' +
        '<div style="height:100%;width:' + pct + '%;background:' + (i===0?'#4CAF50':colorOf(m.name)) + ';border-radius:99px"></div></div>';
      html += '</div>';
    });
    html += '</div></div>';

    // 미설정 멤버
    const healthUnset = members.filter(m => !getMyProfile(m.name));
    if (healthUnset.length > 0) {
      html += '<div class="card" style="margin-top:0;padding:12px 16px">';
      healthUnset.forEach(m => {
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0">' +
          '<span style="font-size:13px;font-weight:700;color:var(--faint)">' + esc(m.name) + '</span>' +
          '<span style="font-size:12px;color:var(--faint)">정보 미설정 — 내 이름 선택 후 설정</span></div>';
      });
      html += '</div>';
    }
  }

  return html;
}

async function giveWarning(name) {
  if (view !== "이성호") return;
  if (!confirm(name + " 님에게 경고를 줄까요? (다이어트 점수 -3점)")) return;
  const cur = warnings[name] || { count: 0, logs: [] };
  cur.count = (cur.count || 0) + 1;
  cur.logs = cur.logs || [];
  cur.logs.push({ date: fmtKey(new Date()), by: "이성호", ts: Date.now() });
  warnings[name] = cur;
  await dbPut(seasonPath("warnings") + "/" + name, cur);
  await loadAll(); render();
}
async function removeWarning(name) {
  if (view !== "이성호") return;
  const cur = warnings[name];
  if (!cur || cur.count <= 0) return;
  if (!confirm(name + " 님 경고를 1회 취소할까요?")) return;
  cur.count = cur.count - 1;
  cur.logs = (cur.logs || []).slice(0, -1);
  warnings[name] = cur;
  await dbPut(seasonPath("warnings") + "/" + name, cur);
  await loadAll(); render();
}

        "오늘 섭취: " + mKcal + "kcal / 운동 소모: " + mBurned + "kcal / 순칼로리: " + netKcal + "kcal\n" +
        "오늘 먹은 것: " + foods + "\n" +
        "이번 주: " + weekDays + "일 기록 / 총 " + weekKcal.toLocaleString() + "kcal\n" +
        "짧고 친근하게 한국어로 답변해요. 이모지 적절히 사용해요.\n\n";
    }
  }
  const apiText = systemCtx + text;
  // 표시용 (시스템 컨텍스트 제외)
  aiHistory.push({ role: "user", parts: [{ text: apiText }], displayText: text });
  setAiHistory(aiHistory);
  aiTyping = true;
  input.value = "";
  render();
  setTimeout(() => { const box = document.getElementById("ai-chat-box"); if (box) box.scrollIntoView({ behavior:"smooth", block:"end" }); }, 100);
  try {
    const payload = { contents: aiHistory.map(m => ({ role: m.role, parts: [{ text: m.parts[0].text }] })) };
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + key,
      { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "답변을 가져오지 못했어요.";
    aiHistory.push({ role: "model", parts: [{ text: reply }], displayText: reply });
    setAiHistory(aiHistory);
  } catch(e) {
    aiHistory.push({ role: "model", parts: [{ text: "오류: " + e.message }], displayText: "오류: " + e.message });
    setAiHistory(aiHistory);
  }
  aiTyping = false;
  render();
  setTimeout(() => {
    const box = document.getElementById("ai-chat-box"); if (box) box.scrollIntoView({ behavior:"smooth", block:"end" });
    const inp = document.getElementById("ai-input"); if (inp) inp.focus();
  }, 100);
}

function renderVoteHtml() {
  const pollList = Object.values(polls);
  let html = '<div class="list" style="padding-bottom:160px">';

  if (view === "all") {
    html += '<div style="margin-bottom:14px;padding:11px 14px;background:var(--accent-soft);border-radius:12px;font-size:13px;font-weight:700;color:var(--accent)">위에서 내 이름을 선택하면 투표할 수 있어요 👆</div>';
  }

  if (pollList.length === 0) {
    html += '<div class="empty">아직 투표가 없어요.<br>아래 + 버튼으로 만들어보세요!</div>';
  } else {
    pollList.slice().reverse().forEach(poll => {
      const totalVotes = Object.values(poll.options || {}).reduce((s, o) => s + (o.voters ? Object.keys(o.voters).length : 0), 0);
      html += '<div class="card" style="margin:0 0 14px">';
      html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">' +
        '<div style="font-size:16px;font-weight:800">' + esc(poll.title) + '</div>' +
        '<button onclick="deletePoll(\'' + poll.id + '\')" style="border:none;background:transparent;color:var(--faint);font-size:12px;font-weight:700;padding:2px 4px;flex-shrink:0">삭제</button>' +
        '</div>';
      html += '<div style="font-size:12px;color:var(--muted);margin-bottom:14px">' + esc(poll.author) + ' · 총 ' + totalVotes + '표</div>';

      Object.entries(poll.options || {}).forEach(([optId, opt]) => {
        const voters = opt.voters ? Object.keys(opt.voters) : [];
        const count = voters.length;
        const pct = totalVotes ? Math.round(count / totalVotes * 100) : 0;
        const myVote = view !== "all" && voters.includes(view);
        html += '<div style="margin-bottom:12px">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">' +
          '<span style="font-size:14px;font-weight:' + (myVote ? '800' : '600') + ';color:' + (myVote ? 'var(--accent)' : 'var(--ink)') + '">' +
          (myVote ? '✓ ' : '') + esc(opt.text) + '</span>' +
          '<span style="font-size:13px;font-weight:700;color:var(--muted)">' + count + '표 ' + pct + '%</span></div>';
        html += '<div style="height:7px;background:var(--bg);border-radius:99px;overflow:hidden;margin-bottom:7px">' +
          '<div style="height:100%;width:' + pct + '%;background:' + (myVote ? 'var(--accent)' : 'var(--faint)') + ';border-radius:99px"></div></div>';
        if (view !== "all") {
          html += '<button onclick="castVote(\'' + poll.id + '\',\'' + optId + '\')" ' +
            'style="padding:7px 16px;border-radius:99px;border:1px solid ' +
            (myVote ? 'var(--accent)' : 'var(--line)') + ';background:' + (myVote ? 'var(--accent-soft)' : 'transparent') +
            ';color:' + (myVote ? 'var(--accent)' : 'var(--muted)') + ';font-size:13px;font-weight:700">' +
            (myVote ? '✓ 취소' : '투표하기') + '</button>';
        }
        html += '</div>';
      });

      html += '<button onclick="openAddOption(\'' + poll.id + '\')" style="width:100%;margin-top:4px;padding:10px;border-radius:12px;border:1px dashed var(--faint);background:transparent;color:var(--muted);font-size:13px;font-weight:700">+ 선택지 추가</button>';
      html += '</div>';
    });
  }

  html += '</div>';
  return html;
}

async function castVote(pollId, optId) {
  if (view === "all") { alert("멤버를 선택한 뒤 투표해주세요!"); return; }
  const poll = polls[pollId];
  if (!poll) return;

}

function streakEmoji(n) {
  if (n >= 30) return '👑';
  if (n >= 21) return '💎';
  if (n >= 14) return '⭐';
  if (n >= 7)  return '🔥🔥';
  return '🔥';
}
function calcStreak(memberName) {
  const dates = [...new Set(
    entries.filter(e => e.member === memberName).map(e => e.date)
  )].sort().reverse();
  if (!dates.length) return 0;
  const today = fmtKey(new Date());
  const yesterday = fmtKey(new Date(Date.now() - 86400000));
  // 오늘 또는 어제 기록이 없으면 스트릭 0
  if (dates[0] !== today && dates[0] !== yesterday) return 0;
  let streak = 1;
  for (let i = 1; i < dates.length; i++) {
    const prev = new Date(dates[i-1]);
    const curr = new Date(dates[i]);
    const diff = (prev - curr) / 86400000;
    if (diff === 1) streak++;
    else break;
  }
  return streak;
}

function calcStreakAt(memberName, baseDate) {
  const dates = [...new Set(
    entries.filter(e => e.member === memberName).map(e => e.date)
  )].sort().reverse();
  if (!dates.length || !dates.includes(baseDate)) return 0;
  const idx = dates.indexOf(baseDate);
  let streak = 1;
  for (let i = idx + 1; i < dates.length; i++) {
    const prev = new Date(dates[i-1]);
    const curr = new Date(dates[i]);
    const diff = (prev - curr) / 86400000;
    if (diff === 1) streak++;
    else break;
  }
  return streak;
}
