<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title> 🏃🏻🏃‍♀️</title>
<style>
  :root {
    --bg: #F7F6F2; --surface: #FFFFFF; --ink: #1C1C19; --muted: #9B9B92;
    --faint: #C7C6BD; --line: #ECEBE4; --accent: #1F8A4C; --accent-soft: #E6F4EC;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .tnum { font-variant-numeric: tabular-nums; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  .noscroll::-webkit-scrollbar { display: none; }
  .noscroll { -ms-overflow-style: none; scrollbar-width: none; }
  .wrap { max-width: 480px; margin: 0 auto; padding-bottom: 220px; }

  /* 헤더 */
  header { padding: 26px 22px 8px; }
  .toprow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .brand { display: flex; align-items: center; gap: 8px; color: var(--accent); }
  .brand span { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
  .toggle { display: flex; background: var(--surface); border-radius: 99px; padding: 3px; border: 1px solid var(--line); }
  .toggle button {
    border: none; border-radius: 99px; padding: 5px 14px; font-size: 13px; font-weight: 700;
    letter-spacing: -0.01em; background: transparent; color: var(--muted); transition: all .15s ease;
  }
  .toggle button.on { background: var(--ink); color: #fff; }
  .nav { display: flex; align-items: center; justify-content: space-between; }
  .nav .icon { border: none; background: transparent; padding: 4px; display: flex; }
  .nav .label {
    border: none; background: transparent; display: flex; align-items: center; gap: 7px;
    padding: 4px 8px; border-radius: 10px; font-size: 19px; font-weight: 800;
    letter-spacing: -0.02em; color: var(--ink);
  }

  /* 합계 카드 */
  .card {
    margin: 8px 22px 4px; background: var(--surface); border-radius: 22px; padding: 22px 24px;
    border: 1px solid var(--line); box-shadow: 0 1px 2px rgba(0,0,0,.02);
  }
  .card .sub { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .card .big { display: flex; align-items: baseline; gap: 6px; }
  .card .big b { font-size: 40px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .card .big span { font-size: 16px; font-weight: 700; color: var(--muted); }
  .card .avg { font-size: 13px; color: var(--muted); font-weight: 600; margin-top: 6px; }
  .bars { margin-top: 18px; display: flex; flex-direction: column; gap: 11px; }
  .bar { display: flex; align-items: center; gap: 10px; }
  .bar .nm { width: 52px; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar .track { flex: 1; height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; }
  .bar .fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
  .bar .kc { width: 56px; text-align: right; font-size: 13px; font-weight: 700; }

  /* 칩 */
  .chips { display: flex; gap: 8px; padding: 16px 22px 6px; overflow-x: auto; }
  .chip {
    flex-shrink: 0; display: flex; align-items: center; gap: 6px; padding: 8px 15px;
    border-radius: 99px; border: 1px solid var(--line); background: var(--surface);
    color: var(--ink); font-size: 14px; font-weight: 700; letter-spacing: -0.01em; transition: all .15s ease;
  }
  .chip.on { border-color: var(--ink); background: var(--ink); color: #fff; }
  .chip .dot { width: 7px; height: 7px; border-radius: 99px; }
  .chip.add { border: 1px dashed var(--faint); background: transparent; color: var(--muted); font-weight: 600; }

  /* 리스트 */
  .list { padding: 10px 22px 0; }
  .empty { text-align: center; color: var(--muted); font-size: 14px; line-height: 1.7; padding: 48px 20px; font-weight: 500; }
  .empty .link { border: none; background: transparent; color: var(--accent); font-weight: 700; font-size: 15px; margin-top: 12px; }
  .group { margin-bottom: 22px; }
  .ghead { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; padding: 0 2px; }
  .ghead b { font-size: 14px; font-weight: 800; letter-spacing: -0.01em; }
  .ghead span { font-size: 13px; font-weight: 700; color: var(--muted); }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .col.tight { gap: 8px; }
  .entry {
    background: var(--surface); border-radius: 16px; padding: 14px 16px; border: 1px solid var(--line);
    display: flex; align-items: center; gap: 13px; animation: pop .25s ease;
  }
  .entry .ava {
    width: 38px; height: 38px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800;
  }
  .entry .mid { flex: 1; min-width: 0; }
  .entry .food { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry.expanded .food { white-space: normal; overflow: visible; text-overflow: unset; word-break: break-word; }
  .entry .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .entry .kc { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; }
  .entry .kc small { font-size: 11px; color: var(--muted); font-weight: 700; }
  .entry .del { border: none; background: transparent; padding: 4px; flex-shrink: 0; display: flex; }

  /* 플로팅 버튼 */
  .fab {
    position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff; border: none; border-radius: 99px;
    padding: 15px 26px; font-size: 16px; font-weight: 800; display: flex; align-items: center;
    gap: 8px; box-shadow: 0 8px 24px rgba(31,138,76,.32); letter-spacing: -0.01em; z-index: 40;
  }

  /* 모달 */
  .overlay {
    position: fixed; inset: 0; background: rgba(20,20,18,.45); z-index: 50;
    display: flex; align-items: flex-start; justify-content: center; padding: 0 16px;
    overflow-y: auto; animation: fade .2s ease;
  }
  .popup {
    background: var(--surface); width: 100%; max-width: 400px; border-radius: 24px;
    padding: 22px 22px 26px; margin-top: 8vh; margin-bottom: 24px; max-height: 82vh; overflow-y: auto;
    animation: popin .22s ease; box-shadow: 0 24px 60px rgba(0,0,0,.22);
  }
  .popup h2 { font-size: 19px; font-weight: 800; letter-spacing: -0.02em; }
  .phead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .phead .x { border: none; background: transparent; padding: 4px; display: flex; }
  .flabel { font-size: 13px; font-weight: 700; color: var(--muted); display: block; margin-bottom: 7px; }
  .ti {
    width: 100%; padding: 15px 16px; font-size: 16px; border: 1px solid var(--line);
    border-radius: 14px; background: var(--bg); color: var(--ink); outline: none; font-weight: 600;
  }
  .ti.num { font-weight: 700; font-variant-numeric: tabular-nums; }
  .save {
    width: 100%; margin-top: 20px; padding: 16px; border-radius: 14px; border: none;
    background: var(--accent); color: #fff; font-size: 16px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .save:disabled { background: var(--bg); color: var(--faint); }

  /* 멤버 선택 칩 (입력 팝업) */
  .mpick { display: flex; gap: 7px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 2px; }
  .mpick button {
    flex-shrink: 0; padding: 7px 14px; border-radius: 99px; border: 1px solid var(--line);
    background: var(--surface); color: var(--muted); font-weight: 700; font-size: 14px;
    display: flex; align-items: center; gap: 6px;
  }
  .mpick button .d { width: 7px; height: 7px; border-radius: 99px; }

  /* 달력 */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .cal-nav .icon { border: none; background: transparent; padding: 4px; display: flex; }
  .cal-title { text-align: center; }
  .cal-title b { font-size: 19px; font-weight: 800; letter-spacing: -0.02em; }
  .cal-title small { display: block; font-size: 12px; color: var(--muted); font-weight: 700; margin-top: 2px; }
  .cal-week { display: grid; grid-template-columns: repeat(7,1fr); margin: 14px 0 4px; }
  .cal-week div { text-align: center; font-size: 12px; font-weight: 700; padding: 4px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .cal-cell {
    position: relative; aspect-ratio: 1; border: none; background: transparent; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  }
  .cal-cell .d { font-size: 15px; font-weight: 600; }
  .cal-cell .mk { width: 5px; height: 5px; border-radius: 99px; }
  .cal-cell.sel { background: var(--accent); }
  .cal-cell.sel .d { color: #fff; font-weight: 800; }
  .cal-cell.today .d { color: var(--accent); font-weight: 800; }
  .cal-cell.future { opacity: .3; pointer-events: none; }
  .cal-today {
    width: 100%; margin-top: 18px; padding: 14px; border-radius: 14px; border: none;
    background: var(--accent-soft); color: var(--accent); font-size: 15px; font-weight: 800;
  }

  /* 설정 화면 */
  .setup { max-width: 460px; margin: 0 auto; padding: 40px 24px; }
  .setup .logo { display: flex; align-items: center; gap: 8px; color: var(--accent); margin-bottom: 18px; }
  .setup h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px; }
  .setup p { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 8px; }
  .setup ol { font-size: 14px; color: var(--ink); line-height: 1.9; margin: 14px 0 20px 18px; }
  .setup ol a { color: var(--accent); font-weight: 700; }
  .setup code { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 2px 6px; font-size: 13px; }
  .invite { margin-top: 14px; padding: 16px; background: var(--accent-soft); border-radius: 14px; font-size: 13px; color: var(--ink); line-height: 1.6; }
  .invite button { margin-top: 10px; width: 100%; padding: 13px; border-radius: 12px; border: none; background: var(--accent); color: #fff; font-weight: 800; font-size: 15px; }
  .gear { position: fixed; top: 14px; right: 14px; z-index: 30; border: none; background: var(--surface); border: 1px solid var(--line); border-radius: 99px; padding: 8px 12px; font-size: 12px; font-weight: 700; color: var(--muted); }

  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes popin { from { opacity: 0; transform: scale(.96) translateY(-8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="modal"></div>

<script>
// ─────────────────────────────────────────────────────────────
//  설정: 모임 서버(Firebase Realtime Database) 주소
//  비워두면 앱에서 직접 입력할 수 있습니다.
// ─────────────────────────────────────────────────────────────
const MEMBER_COLORS = ["#FF8A65","#4FC3F7","#BA68C8","#FFB74D","#4DB6AC","#F06292","#9575CD","#AED581"];
const WEEK = ["일","월","화","수","목","금","토"];

// 상태
let DB_URL = "https://diet-cae5a-default-rtdb.firebaseio.com";
let members = [];
let entries = [];
let polls = {};
let notices = {};
let seasons = {};
let currentSeasonId = "default";
let date = new Date();
let view = "all";
let mode = "day";
let loaded = false;
let pollTimer = null;
let cardCollapsed = { streak: true, mvp: true, summary: true };
let pledges = {};
let meetDate = "";
let hall = null;

// 현재 시즌 DB 경로 prefix
function seasonPath(sub) {
  return currentSeasonId === "default" ? sub : "seasons/" + currentSeasonId + "/" + sub;
}

// ── DB 주소 결정 (URL 해시 > localStorage) ──
(function initDbUrl() {
  const hash = location.hash.match(/db=([^&]+)/);
  if (hash) {
    DB_URL = decodeURIComponent(hash[1]).replace(/\/+$/, "");
    try { localStorage.setItem("dietclub_db", DB_URL); } catch (e) {}
  } else {
    try { DB_URL = localStorage.getItem("dietclub_db") || "https://diet-cae5a-default-rtdb.firebaseio.com"; } catch (e) { DB_URL = "https://diet-cae5a-default-rtdb.firebaseio.com"; }
  }
})();

// ── 날짜 유틸 ──
function fmtKey(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function fmtLabel(d) {
  const isToday = fmtKey(d) === fmtKey(new Date());
  const base = (d.getMonth()+1) + "월 " + d.getDate() + "일 (" + WEEK[d.getDay()] + ")";
  return isToday ? "오늘 · " + base : base;
}
function fmtTime(ts) {
  const d = new Date(ts), h = d.getHours(), m = String(d.getMinutes()).padStart(2,"0");
  const ap = h < 12 ? "오전" : "오후", hh = h % 12 === 0 ? 12 : h % 12;
  return ap + " " + hh + ":" + m;
}
function fmtDateHeader(s) {
  const [y,mo,da] = s.split("-").map(Number);
  return mo + "월 " + da + "일 (" + WEEK[new Date(y,mo-1,da).getDay()] + ")";
}

function getWeekRange(baseDate) {
  const end = new Date(baseDate);
  end.setHours(23,59,59,999);
  const start = new Date(end);
  start.setDate(end.getDate() - 6);
  start.setHours(0,0,0,0);
  return { start, end };
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function colorOf(name) {
  const i = members.findIndex(m => m.name === name);
  return i >= 0 ? MEMBER_COLORS[i % MEMBER_COLORS.length] : "#C7C6BD";
}

function avatarOf(name) {
  if (name === "이성호") return "🐻";
  if (name === "허니비") return "🐝";
  if (name === "여름") return "🌺";
  return name.slice(0,1);
}


// ── DB (Firebase Realtime Database REST) ──
async function dbGet(path) {
  const r = await fetch(DB_URL + "/" + path + ".json");
  if (!r.ok) throw new Error("get " + r.status);
  return await r.json();
}
async function dbPut(path, data) {
  const r = await fetch(DB_URL + "/" + path + ".json", { method: "PUT", body: JSON.stringify(data) });
  if (!r.ok) throw new Error("put " + r.status);
}
async function dbDelete(path) {
  await fetch(DB_URL + "/" + path + ".json", { method: "DELETE" });
}
async function loadAll() {
  const [m, e, p, n, s, pl, md, h] = await Promise.all([
    dbGet(seasonPath("members")),
    dbGet(seasonPath("entries")),
    dbGet(seasonPath("polls")),
    dbGet(seasonPath("notices")),
    dbGet("seasons"),
    dbGet(seasonPath("pledges/" + fmtKey(new Date()))),
    currentSeasonId === "default" ? dbGet("meetDate") : dbGet("seasons/" + currentSeasonId + "/meetDate"),
    currentSeasonId === "default" ? dbGet("hall") : dbGet("seasons/" + currentSeasonId + "/hall")
  ]);
  members = Array.isArray(m) ? m : (m ? Object.values(m) : []);
  entries = e ? Object.values(e) : [];
  polls = p || {};
  notices = n || {};
  seasons = s || {};
  pledges = pl || {};
  meetDate = md || "";
  hall = h || null;
  loaded = true;
}

// ── 액션 ──
async function addMember(name) {
  const t = name.trim();
  if (!t || members.some(m => m.name === t)) return;
  members = [...members, { name: t }];
  view = t;
  await dbPut(seasonPath("members"), members);
  render();
}
async function addEntry(member, food, calories) {
  const entry = {
    id: Date.now() + "-" + Math.random().toString(36).slice(2,7),
    member, food, mealType: mealTypeSel, calories, timestamp: Date.now(), date: fmtKey(date),
  };
  entries = [...entries, entry];
  render();
  await dbPut(seasonPath("entries") + "/" + entry.id, entry);
}
async function removeEntry(id) {
  entries = entries.filter(e => e.id !== id);
  render();
  await dbDelete(seasonPath("entries") + "/" + id);
}
function shiftDay(d) { const x = new Date(date); x.setDate(x.getDate()+d); date = x; render(); }
function shiftMonth(d) { date = new Date(date.getFullYear(), date.getMonth()+d, 1); render(); }
function setMode(m) { mode = m; render(); }
function setView(v) {
  view = v;
  const chips = document.querySelector(".chips");
  const scrollLeft = chips ? chips.scrollLeft : 0;
  render();
  requestAnimationFrame(() => {
    const newChips = document.querySelector(".chips");
    if (newChips) newChips.scrollLeft = scrollLeft;
  });
}

// ── 메인 렌더 ──
function render() {
  if (!DB_URL) { renderSetup(); return; }
  const app = document.getElementById("app");

  const dayKey = fmtKey(date);
  const dayEntries = entries.filter(e => e.date === dayKey).sort((a,b) => b.timestamp - a.timestamp);
  const shown = view === "all" ? dayEntries : dayEntries.filter(e => e.member === view);

  const monthPrefix = date.getFullYear() + "-" + String(date.getMonth()+1).padStart(2,"0");
  const monthEntries = entries
    .filter(e => e.date.startsWith(monthPrefix) && (view === "all" || e.member === view))
    .sort((a,b) => a.date === b.date ? b.timestamp - a.timestamp : b.date.localeCompare(a.date));
  const monthGroups = [];
  monthEntries.forEach(e => {
    let g = monthGroups.find(x => x.date === e.date);
    if (!g) { g = { date: e.date, items: [], total: 0 }; monthGroups.push(g); }
    g.items.push(e); g.total += e.calories;
  });

  const isMonth = mode === "month";
  const isWeek = mode === "week";
  const isVote = mode === "vote";
  const isNotice = mode === "notice";
  const isMukbang = mode === "mukbang";
  const isCommunity = isVote || isNotice || isMukbang;
  const isRecord = !isCommunity;
  const isReadOnly = currentSeasonId !== "default" && seasons[currentSeasonId] && seasons[currentSeasonId].ended;

  // 오늘 새 공지/투표 있는지 체크 (레드닷)
  const todayKey = fmtKey(new Date());
  const hasNewNotice = Object.values(notices).some(n => n.date === todayKey);
  const hasNewPoll = Object.values(polls).some(p => {
    const d = new Date(p.createdAt);
    return fmtKey(d) === todayKey;
  });
  const hasNewCommunity = (hasNewNotice && !isNotice) || (hasNewPoll && !isVote);
  const wr = getWeekRange(date);
  const weekEntries = entries.filter(e => {
    const d = new Date(e.timestamp);
    return d >= wr.start && d <= wr.end &&
      (view === "all" || e.member === view);
  }).sort((a,b) => b.timestamp - a.timestamp);

  const totalKcal = (isMonth ? monthEntries : (isWeek ? weekEntries : shown)).reduce((s,e) => s + e.calories, 0);
  const monthAvg = monthGroups.length ? Math.round(totalKcal / monthGroups.length) : 0;
  const perMember = members.map(m => ({
    name: m.name,
    kcal: (isMonth
      ? entries.filter(e => e.date.startsWith(monthPrefix) && e.member === m.name)
      : isWeek
        ? weekEntries.filter(e => e.member === m.name)
        : dayEntries.filter(e => e.member === m.name)
    ).reduce((s,e) => s + e.calories, 0),
  }));
  const maxKcal = Math.max(1, ...perMember.map(p => p.kcal));

  let html = '<div class="wrap">';

  // 헤더
  html += '<header><div class="toprow">';
  html += '<div class="brand">' + iconUsers() + '<span> 🏃🏻🏃‍♀️</span></div>';

  // 시즌 선택
  const currentSeasonName = currentSeasonId === "default"
    ? "시즌 1"
    : (seasons[currentSeasonId] ? seasons[currentSeasonId].name : "시즌");
  const isCurrentSeason = currentSeasonId === "default" || (seasons[currentSeasonId] && !seasons[currentSeasonId].ended);
  html += '<button onclick="openSeasonMenu()" style="display:flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--surface);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--muted)">' +
    esc(currentSeasonName) +
    (!isCurrentSeason ? ' <span style="color:#E0726A;font-size:10px">종료</span>' : '') +
    ' ▾</button>';
  html += '<div class="toggle">' +
    '<button class="' + (isRecord?"on":"") + '" onclick="setMode(\'day\')">📋 기록</button>' +
    '<button class="' + (isCommunity?"on":"") + '" onclick="setMode(\'vote\')" style="position:relative">💬 커뮤니티' +
    (hasNewCommunity ? '<span style="position:absolute;top:2px;right:2px;width:7px;height:7px;background:#E0726A;border-radius:99px;border:1.5px solid var(--surface)"></span>' : '') +
    '</button></div>'; ;
  html += '</div>';

  // 서브 토글
  if (isRecord) {
    html += '<div style="display:flex;gap:6px;padding:10px 22px 0">' +
      '<button onclick="setMode(\'day\')" style="flex:1;padding:8px;border-radius:10px;border:1px solid ' + (mode==="day"?"var(--ink)":"var(--line)") + ';background:' + (mode==="day"?"var(--ink)":"transparent") + ';color:' + (mode==="day"?"#fff":"var(--muted)") + ';font-size:13px;font-weight:700">일별</button>' +
      '<button onclick="setMode(\'week\')" style="flex:1;padding:8px;border-radius:10px;border:1px solid ' + (mode==="week"?"var(--ink)":"var(--line)") + ';background:' + (mode==="week"?"var(--ink)":"transparent") + ';color:' + (mode==="week"?"#fff":"var(--muted)") + ';font-size:13px;font-weight:700">주간</button>' +
      '<button onclick="setMode(\'month\')" style="flex:1;padding:8px;border-radius:10px;border:1px solid ' + (mode==="month"?"var(--ink)":"var(--line)") + ';background:' + (mode==="month"?"var(--ink)":"transparent") + ';color:' + (mode==="month"?"#fff":"var(--muted)") + ';font-size:13px;font-weight:700">월별</button>' +
      '</div>';
  } else {
    html += '<div style="display:flex;gap:6px;padding:10px 22px 0">' +
      '<button onclick="setMode(\'vote\')" style="flex:1;padding:8px;border-radius:10px;border:1px solid ' + (mode==="vote"?"var(--ink)":"var(--line)") + ';background:' + (mode==="vote"?"var(--ink)":"transparent") + ';color:' + (mode==="vote"?"#fff":"var(--muted)") + ';font-size:13px;font-weight:700;position:relative">🗳️ 투표' +
      (hasNewPoll && mode !== "vote" ? '<span style="position:absolute;top:2px;right:2px;width:7px;height:7px;background:#E0726A;border-radius:99px;border:1.5px solid var(--surface)"></span>' : '') +
      '</button>' +
      '<button onclick="setMode(\'notice\')" style="flex:1;padding:8px;border-radius:10px;border:1px solid ' + (mode==="notice"?"var(--ink)":"var(--line)") + ';background:' + (mode==="notice"?"var(--ink)":"transparent") + ';color:' + (mode==="notice"?"#fff":"var(--muted)") + ';font-size:13px;font-weight:700;position:relative">📌 공지' +
      (hasNewNotice && mode !== "notice" ? '<span style="position:absolute;top:2px;right:2px;width:7px;height:7px;background:#E0726A;border-radius:99px;border:1.5px solid var(--surface)"></span>' : '') +
      '</button>' +
      '<button onclick="setMode(\'mukbang\')" style="flex:1;padding:8px;border-radius:10px;border:1px solid ' + (mode==="mukbang"?"var(--ink)":"var(--line)") + ';background:' + (mode==="mukbang"?"var(--ink)":"transparent") + ';color:' + (mode==="mukbang"?"#fff":"var(--muted)") + ';font-size:13px;font-weight:700">🍔 먹방왕' +
      '</button>' +
      '</div>';
  }

  if (isRecord) {
    html += '<div class="nav">';
    html += '<button class="icon" onclick="' + (isMonth?"shiftMonth(-1)":"shiftDay(-1)") + '" aria-label="이전">' + iconChevron("left") + '</button>';
    if (isMonth) {
      html += '<div class="label">' + date.getFullYear() + '년 ' + (date.getMonth()+1) + '월</div>';
    } else {
      html += '<button class="label" onclick="openCalendar()">' + fmtLabel(date) + iconCal() + '</button>';
    }
    html += '<button class="icon" onclick="' + (isMonth?"shiftMonth(1)":"shiftDay(1)") + '" aria-label="다음">' + iconChevron("right") + '</button>';
    html += '</div>';
  }
  html += '</header>';

  // 합계 카드 + 스트릭/MVP (투표/공지 모드 제외)
  if (!isVote && !isNotice && !isMukbang) {

    // 1. D-day 카드 (제일 위)
    if (!isMonth && !isWeek && view === "all" && meetDate) {
      const today = new Date(); today.setHours(0,0,0,0);
      const meet = new Date(meetDate); meet.setHours(0,0,0,0);
      const diff = Math.round((meet - today) / 86400000);
      if (diff >= 0) {
        const isToday = diff === 0;
        const isTomorrow = diff === 1;
        const bg = isToday ? 'var(--accent)' : isTomorrow ? '#E0726A' : 'var(--surface)';
        const textColor = (isToday || isTomorrow) ? '#fff' : 'var(--ink)';
        const subColor = (isToday || isTomorrow) ? 'rgba(255,255,255,.8)' : 'var(--muted)';
        const dateColor = (isToday || isTomorrow) ? 'rgba(255,255,255,.7)' : 'var(--muted)';
        const emoji = isToday ? '🎊' : isTomorrow ? '😤' : '🏃🏻';
        const label = isToday ? '🎉 오늘이에요!' : isTomorrow ? '😤 내일 모임이에요!' : 'D-' + diff;
        const sub = isTomorrow ? '오늘 잘 먹어요 💪' : '다음 모임';
        html += '<div class="card" style="background:' + bg + '">';
        html += '<div style="display:flex;align-items:center;justify-content:space-between">';
        html += '<div>';
        html += '<div style="font-size:13px;font-weight:700;color:' + subColor + '">' + sub + '</div>';
        html += '<div style="font-size:22px;font-weight:900;color:' + textColor + ';margin-top:2px">' + label + '</div>';
        html += '<div style="font-size:12px;color:' + dateColor + ';margin-top:2px">' + meetDate.replace(/-/g,'.') + '</div>';
        html += '</div>';
        html += '<div style="font-size:48px">' + emoji + '</div>';
        html += '</div></div>';
      }
    }

    // 2. 오늘 현황 카드
    if (!isMonth && !isWeek && view === "all" && members.length > 0 && loaded) {
      html += '<div class="card" style="margin-top:0">';
      html += '<div class="sub">📋 오늘 현황</div>';
      html += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">';
      members.forEach(m => {
        const hasTodayRecord = dayEntries.some(e => e.member === m.name);
        if (hasTodayRecord) {
          const todayKcal = dayEntries.filter(e => e.member === m.name).reduce((s,e) => s + e.calories, 0);
          html += '<div style="display:flex;align-items:center;justify-content:space-between">' +
            '<span style="font-size:14px;font-weight:700">✅ ' + esc(m.name) + '</span>' +
            '<span style="font-size:13px;font-weight:700;color:var(--accent)">' + todayKcal.toLocaleString() + ' kcal</span>' +
            '</div>';
        } else {
          let missDay = 1;
          const d = new Date(); d.setDate(d.getDate() - 1);
          while (missDay < 30) {
            const key = fmtKey(d);
            const hasRecord = entries.some(e => e.member === m.name && e.date === key);
            if (hasRecord) break;
            missDay++;
            d.setDate(d.getDate() - 1);
          }
          const yesterdayKey = fmtKey(new Date(Date.now() - 86400000));
          const hadStreak = missDay === 2 && entries.some(e => e.member === m.name && e.date === fmtKey(new Date(Date.now() - 86400000 * 2)));
          const prevStreak = hadStreak ? calcStreakAt(m.name, fmtKey(new Date(Date.now() - 86400000 * 2))) + 1 : 0;
          const emoji = missDay >= 3 ? '💀' : missDay === 2 ? '🚨' : '😴';
          const msg = missDay >= 3 ? missDay + '일째 다이어트 포기?' : missDay === 2 ? '이틀째 행방불명' : '아직 안 했어요';
          html += '<div style="display:flex;align-items:center;justify-content:space-between">' +
            '<span style="font-size:14px;font-weight:700;color:var(--muted)">' + emoji + ' ' + esc(m.name) + '</span>' +
            '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">' +
            '<span style="font-size:12px;font-weight:700;color:#E0726A">' + msg + '</span>' +
            (missDay === 2 && prevStreak >= 2 ? '<span style="font-size:11px;color:var(--muted)">😢 ' + prevStreak + '일 스트릭 끊겼어요</span>' : '') +
            '</div></div>';
        }
      });
      html += '</div></div>';
    }

    // 3. 오늘의 다짐 카드
    if (!isMonth && !isWeek && members.length > 0 && loaded) {
      html += '<div class="card" style="margin-top:0">';
      html += '<div class="sub">💬 오늘의 다짐</div>';
      html += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">';
      members.forEach(m => {
        const pledge = pledges[m.name];
        html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">';
        html += '<span style="font-size:13px;font-weight:700;flex-shrink:0">' + esc(m.name) + '</span>';
        if (pledge) {
          html += '<span style="font-size:13px;color:var(--ink);flex:1;text-align:right">"' + esc(pledge) + '"</span>';
        } else {
          html += '<span style="font-size:12px;color:var(--faint);flex:1;text-align:right">아직 없음</span>';
        }
        html += '</div>';
      });
      html += '</div>';
      const myPledge = view !== "all" ? (pledges[view] || "") : "";
      html += '<div style="display:flex;gap:8px;margin-top:12px">' +
        '<input class="ti" id="pledge-input" placeholder="' + (view === "all" ? "이름 선택 후 다짐 입력" : "오늘의 다짐 한 줄") + '" value="' + esc(myPledge) + '" ' + (view === "all" ? 'disabled ' : '') + 'style="flex:1;margin:0" />' +
        '<button onclick="submitPledge()" ' + (view === "all" ? 'disabled ' : '') + 'style="padding:0 16px;border-radius:12px;border:none;background:' + (view === "all" ? 'var(--faint)' : 'var(--accent)') + ';color:#fff;font-size:13px;font-weight:800">저장</button>' +
        '</div>';
      html += '</div>';
    }

    // 4. 합계 카드 (접힌 상태 기본)
    html += '<div class="card" style="margin-top:0">';
    html += '<div class="sub" onclick="toggleWeekDay(\'summary-card\')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">' +
      (isMonth ? (view==="all" ? "이번 달 모임 전체" : "이번 달 " + esc(view) + " 님") : (view==="all" ? "모임 전체 섭취량" : esc(view) + " 님 섭취량")) +
      '<span id="summary-card-arrow" style="font-size:12px;color:var(--muted)">' + (cardCollapsed.summary ? '▼' : '▲') + '</span></div>';
    html += '<div id="summary-card" style="display:' + (cardCollapsed.summary ? 'none' : 'block') + '">';
    html += '<div class="big"><b class="tnum">' + totalKcal.toLocaleString() + '</b><span>kcal</span></div>';
    if (isMonth) html += '<div class="avg tnum">기록한 ' + monthGroups.length + '일 · 하루 평균 ' + monthAvg.toLocaleString() + ' kcal</div>';
    if (view === "all" && perMember.length) {
      html += '<div class="bars">';
      perMember.forEach(p => {
        html += '<div class="bar"><span class="nm">' + esc(p.name) + '</span>' +
          '<div class="track"><div class="fill" style="width:' + (p.kcal/maxKcal*100) + '%;background:' + colorOf(p.name) + '"></div></div>' +
          '<span class="kc tnum" style="color:' + (p.kcal?"var(--ink)":"var(--faint)") + '">' + p.kcal.toLocaleString() + '</span></div>';
      });
      html += '</div>';
    }
    html += '</div></div>';

    // 명예의 전당 (종료된 시즌)
    if (isReadOnly && hall) {
      html += '<div class="card" style="margin-top:0">';
      html += '<div class="sub">🏆 명예의 전당</div>';
      html += '<div style="display:flex;flex-direction:column;gap:12px;margin-top:12px">';
      if (hall.mvp) html += '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<span style="font-size:14px;color:var(--muted);font-weight:700">👑 시즌 MVP</span>' +
        '<span style="font-size:15px;font-weight:800">' + esc(hall.mvp.name) + ' <span style="color:var(--muted);font-size:12px">' + hall.mvp.days + '일 기록</span></span></div>';
      if (hall.streak) html += '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<span style="font-size:14px;color:var(--muted);font-weight:700">🔥 최장 스트릭</span>' +
        '<span style="font-size:15px;font-weight:800">' + esc(hall.streak.name) + ' <span style="color:var(--muted);font-size:12px">' + hall.streak.streak + '일 연속</span></span></div>';
      if (hall.record) html += '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<span style="font-size:14px;color:var(--muted);font-weight:700">📋 최다 기록</span>' +
        '<span style="font-size:15px;font-weight:800">' + esc(hall.record.name) + ' <span style="color:var(--muted);font-size:12px">' + hall.record.days + '일</span></span></div>';
      html += '</div></div>';
    }

    if (view === "all" && members.length > 0 && loaded) {
      const streaks = members.map(m => ({ name: m.name, streak: calcStreak(m.name) })).filter(s => s.streak > 0);
      if (streaks.length > 0) {
        html += '<div class="card" style="margin-top:0">';
        html += '<div class="sub" onclick="toggleWeekDay(\'streak-card\')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">🔥 연속 기록 스트릭<span id="streak-card-arrow" style="font-size:12px;color:var(--muted)">' + (cardCollapsed.streak ? '▼' : '▲') + '</span></div>';
        html += '<div id="streak-card" style="display:' + (cardCollapsed.streak ? 'none' : 'block') + '">';
        html += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">';
        streaks.sort((a,b) => b.streak - a.streak).forEach(s => {
          const flames = s.streak >= 7 ? '🔥🔥🔥' : s.streak >= 3 ? '🔥🔥' : '🔥';
          html += '<div style="display:flex;align-items:center;justify-content:space-between">' +
            '<span style="font-size:14px;font-weight:700">' + esc(s.name) + '</span>' +
            '<span style="font-size:14px;font-weight:800;color:var(--accent)">' + flames + ' ' + s.streak + '일 연속</span>' +
            '</div>';
        });
        html += '</div></div></div>';
      }

      // MVP 카드
      const wr2 = getWeekRange(new Date());
      const mvpData = members.map(m => {
        const wEntries = entries.filter(e => {
          const d = new Date(e.timestamp);
          return d >= wr2.start && d <= wr2.end && e.member === m.name && e.calories > 0;
        });
        const days = new Set(wEntries.map(e => e.date)).size;
        const kcal = wEntries.reduce((s, e) => s + e.calories, 0);
        return { name: m.name, days, kcal };
      }).filter(m => m.days > 0);

      if (mvpData.length > 0) {
        mvpData.sort((a, b) => b.days !== a.days ? b.days - a.days : a.kcal - b.kcal);
        const mvp = mvpData[0];
        html += '<div class="card" style="margin-top:0">';
        html += '<div class="sub" onclick="toggleWeekDay(\'mvp-card\')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">🏆 이번 주 MVP<span id="mvp-card-arrow" style="font-size:12px;color:var(--muted)">' + (cardCollapsed.mvp ? '▼' : '▲') + '</span></div>';
        html += '<div id="mvp-card" style="display:' + (cardCollapsed.mvp ? 'none' : 'block') + '">';
        html += '<div style="display:flex;align-items:center;gap:12px;margin-top:12px">';
        const mc = colorOf(mvp.name);
        html += '<span style="width:46px;height:46px;border-radius:14px;background:' + mc + '22;color:' + mc + ';display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0">' + esc(avatarOf(mvp.name)) + '</span>';
        html += '<div style="flex:1">' +
          '<div style="font-size:17px;font-weight:800">' + esc(mvp.name) + ' 👑</div>' +
          '<div style="font-size:12px;color:var(--muted);margin-top:3px">' + mvp.days + '일 기록 · ' + mvp.kcal.toLocaleString() + ' kcal</div>' +
          '</div>';
        html += '</div>';
        if (mvpData.length > 1) {
          html += '<div style="margin-top:12px;display:flex;flex-direction:column;gap:6px">';
          mvpData.slice(1).forEach((m, i) => {
            html += '<div style="display:flex;justify-content:space-between;font-size:13px">' +
              '<span style="color:var(--muted)">' + (i+2) + '위 ' + esc(m.name) + '</span>' +
              '<span style="color:var(--muted);font-weight:700">' + m.days + '일 · ' + m.kcal.toLocaleString() + ' kcal</span>' +
              '</div>';
          });
          html += '</div>';
        }
        html += '</div></div>';
      }
    }
  }

  // 칩
  html += '<div class="chips noscroll">';
  html += '<button class="chip ' + (view==="all"?"on":"") + '" onclick="setView(\'all\')">전체</button>';
  members.forEach(m => {
    const streak = calcStreak(m.name);
    const streakBadge = streak >= 2 ? ' <span style="font-size:12px">🔥' + streak + '</span>' : '';
    html += '<button class="chip ' + (view===m.name?"on":"") + '" onclick="setView(\'' + esc(m.name).replace(/'/g,"\\'") + '\')">' +
      '<span class="dot" style="background:' + colorOf(m.name) + '"></span>' + esc(m.name) + streakBadge + '</button>';
  });
  html += '<button class="chip add" onclick="openMember()">' + iconPlus(15) + ' 멤버</button>';
  html += '</div>';

  // 리스트 (투표/공지 모드 제외)
  if (!isVote && !isNotice && !isMukbang) {
    html += '<div class="list">';
    if (!loaded) {
      html += '<div class="empty">불러오는 중…</div>';
    } else if (members.length === 0) {
      html += '<div class="empty">먼저 함께할 멤버를 추가해보세요.<br><button class="link" onclick="openMember()">+ 멤버 추가하기</button></div>';
    } else if (isMonth) {
      if (monthGroups.length === 0) html += '<div class="empty">이번 달 기록이 없어요.</div>';
      else monthGroups.forEach(g => {
        const isToday = g.date === fmtKey(new Date());
        const uid = "month-" + g.date;
        html += '<div class="group">';
        html += '<div class="ghead" onclick="toggleWeekDay(\'' + uid + '\')" style="cursor:pointer">' +
          '<b>' + fmtDateHeader(g.date) + (isToday ? ' <span style="color:var(--accent);font-size:11px;font-weight:800">오늘</span>' : '') + '</b>' +
          '<span style="display:flex;align-items:center;gap:8px">' +
          '<span class="tnum">' + g.total.toLocaleString() + ' kcal</span>' +
          '<span id="' + uid + '-arrow" style="font-size:12px;color:var(--muted)">' + (isToday ? '▲' : '▼') + '</span>' +
          '</span></div>';
        html += '<div id="' + uid + '" style="display:' + (isToday ? 'block' : 'none') + '">';
        html += '<div class="col tight">';
        g.items.forEach(e => html += entryCard(e));
        html += '</div></div></div>';
      });
    } else if (isWeek) {
      if (weekEntries.length === 0) {
        html += '<div class="empty">최근 7일 기록이 없어요.</div>';
      } else {
        const dayMap = {};
        weekEntries.forEach(e => {
          if (!dayMap[e.date]) dayMap[e.date] = {};
          if (!dayMap[e.date][e.member]) dayMap[e.date][e.member] = [];
          dayMap[e.date][e.member].push(e);
        });
        const dates = Object.keys(dayMap).sort().reverse(); // 최신 날짜 위로
        dates.forEach(d => {
          const isToday = d === fmtKey(new Date());
          const totalCal = Object.values(dayMap[d]).reduce((s,a) => s + a.reduce((ss,e) => ss + e.calories, 0), 0);
          const uid = "week-" + d;
          html += '<div class="group">';
          html += '<div class="ghead" onclick="toggleWeekDay(\'' + uid + '\')" style="cursor:pointer">' +
            '<b>' + fmtDateHeader(d) + (isToday ? ' <span style="color:var(--accent);font-size:11px;font-weight:800">오늘</span>' : '') + '</b>' +
            '<span style="display:flex;align-items:center;gap:8px">' +
            '<span class="tnum" style="font-size:13px">' + (totalCal ? totalCal.toLocaleString() + ' kcal' : '') + '</span>' +
            '<span id="' + uid + '-arrow" style="font-size:12px;color:var(--muted)">' + (isToday ? '▲' : '▼') + '</span>' +
            '</span></div>';
          html += '<div id="' + uid + '" style="display:' + (isToday ? 'block' : 'none') + '">';
          Object.keys(dayMap[d]).forEach(name => {
            html += '<div class="group" style="margin-bottom:10px">';
            html += '<div class="ghead"><b>' + esc(name) + '</b></div>';
            html += '<div class="col tight">';
            dayMap[d][name].sort((a,b)=>a.timestamp-b.timestamp).forEach(e => html += entryCard(e));
            html += '</div></div>';
          });
          html += '</div></div>';
        });
      }
    } else if (shown.length === 0) {
      html += '<div class="empty">아직 기록이 없어요.<br>아래 + 버튼으로 먹은 걸 적어보세요.</div>';
    } else {
      const meals = [
        { key:'아침', icon:'🌅' },
        { key:'점심', icon:'☀️' },
        { key:'저녁', icon:'🌙' },
        { key:'간식', icon:'🍎' }
      ];
      meals.forEach(m => {
        const rows = shown.filter(e => (e.mealType || '아침') === m.key);
        if (!rows.length) return;
        html += '<div class="group">';
        html += '<div class="ghead"><b>' + m.icon + ' ' + m.key + '</b><span>' + rows.length + '개 기록</span></div>';
        html += '<div class="col tight">';
        rows.forEach(e => html += entryCard(e));
        html += '</div></div>';
      });
    }
    html += '</div>';
  } else if (isVote) {
    html += renderVoteHtml();
  } else if (isNotice) {
    html += renderNoticeHtml();
  } else if (isMukbang) {
    html += renderMukbangHtml();
  }

  html += '</div>';

  // 플로팅 버튼

let calView = null;
function openCalendar() {
  calView = new Date(date.getFullYear(), date.getMonth(), 1);
  renderCalendar();
}
function calShift(d) { calView = new Date(calView.getFullYear(), calView.getMonth()+d, 1); renderCalendar(); }
function pickDate(y, mo, da) { date = new Date(y, mo, da); closeModal(); render(); }
function gotoToday() { date = new Date(); closeModal(); render(); }
function renderCalendar() {
  const dateTotals = {};
  entries.forEach(e => { dateTotals[e.date] = (dateTotals[e.date]||0) + e.calories; });
  const y = calView.getFullYear(), mo = calView.getMonth();
  const first = new Date(y, mo, 1).getDay();
  const days = new Date(y, mo+1, 0).getDate();
  const todayKey = fmtKey(new Date()), selKey = fmtKey(date), now = new Date();
  let monthTotal = 0;
  Object.keys(dateTotals).forEach(k => { const [yy,mm] = k.split("-").map(Number); if (yy===y && mm===mo+1) monthTotal += dateTotals[k]; });

  let html = '<div class="overlay" onclick="closeModal(event)"><div class="popup" onclick="event.stopPropagation()" style="max-height:92vh">';
  html += '<div class="cal-nav"><button class="icon" onclick="calShift(-1)">' + iconChevron("left") + '</button>' +
    '<div class="cal-title"><b>' + y + '년 ' + (mo+1) + '월</b><small class="tnum">이번 달 ' + monthTotal.toLocaleString() + ' kcal</small></div>' +
    '<button class="icon" onclick="calShift(1)">' + iconChevron("right") + '</button></div>';
  html += '<div class="cal-week">' + WEEK.map((w,i) => '<div style="color:' + (i===0?"#E0726A":i===6?"#5B8FC7":"var(--muted)") + '">' + w + '</div>').join("") + '</div>';
  html += '<div class="cal-grid">';
  for (let i = 0; i < first; i++) html += '<div></div>';
  for (let d = 1; d <= days; d++) {
    const key = fmtKey(new Date(y, mo, d));
    const cls = ["cal-cell"];
    if (key === selKey) cls.push("sel");
    if (key === todayKey) cls.push("today");
    const future = new Date(y, mo, d) > now;
    if (future) cls.push("future");
    const has = dateTotals[key] > 0;
    const mkColor = key === selKey ? "#fff" : "var(--accent)";
    html += '<button class="' + cls.join(" ") + '" ' + (future?"":'onclick="pickDate(' + y + ',' + mo + ',' + d + ')"') + '>' +
      '<span class="d">' + d + '</span>' +
      (has ? '<span class="mk" style="background:' + mkColor + '"></span>' : '<span class="mk" style="background:transparent"></span>') +
      '</button>';
  }
  html += '</div><button class="cal-today" onclick="gotoToday()">오늘로 이동</button></div></div>';
  document.getElementById("modal").innerHTML = html;
}

function saveDbUrl() {

}

  else prompt("아래 링크를 복사하세요", link);
}

// ── 시작/폴링 ──
async function start() {
  if (!DB_URL) { renderSetup(); return; }
  render();
  try { await loadAll(); render(); }
  catch (e) {
    // 연결 실패해도 기존 데이터 유지, loaded만 true로
    if (!loaded) { loaded = true; render(); }
    return;
  }
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (document.getElementById("modal").innerHTML) return;
    if (document.activeElement && document.activeElement.id === "pledge-input") return;
    try { await loadAll(); render(); } catch (e) {}
  }, 5000);
}
function resetDb() {
  try { localStorage.removeItem("dietclub_db"); } catch (e) {}
  DB_URL = ""; location.hash = "";
  const g = document.getElementById("invite-gear"); if (g) g.remove();
  renderSetup();
}

function estimateCalories() {
  const food = document.getElementById("f-food").value.trim();
  if (!food) { alert("먼저 음식 이름을 입력해주세요!"); return; }
  const btn = document.getElementById("ai-btn");
  const resultBox = document.getElementById("ai-result");
  btn.disabled = true;
  btn.innerHTML = '🔍 추정 중...';
  resultBox.style.display = "none";

  const lines = food.split(/[\n,]+/).map(l => l.trim()).filter(Boolean);
  const results = [];
  let total = 0;

  lines.forEach(line => {
    const low = line.toLowerCase();

    // g 또는 ml 단위 감지 (예: 80g, 150ml)
    const gramMatch = line.match(/(\d+)\s*(g|ml|그램|밀리)/i);
    const numMatch = line.match(/(\d+)/);
    const qty = numMatch ? parseInt(numMatch[1]) : 1;

    let matched = null;
    for (const item of KCAL_DB) {
      if (item.k.some(k => low.includes(k))) { matched = item; break; }
    }
    if (matched) {
      let cal, note;
      if (gramMatch && matched.w) {
        // g/ml 입력 + 기준 무게 있을 때 비율 계산
        const inputG = parseInt(gramMatch[1]);
        cal = Math.round(matched.c * (inputG / matched.w));
        note = matched.n + " 기준 → " + inputG + gramMatch[2] + " 환산";
      } else if (matched.unit) {
        cal = matched.c * qty;
        note = matched.n + (qty > 1 ? " × " + qty : "");
      } else {
        cal = matched.c;
        note = matched.n;
      }
      results.push({ name: line, kcal: cal, note });
      total += cal;
    } else {
      results.push({ name: line, kcal: null, note: "DB에 없음 — 직접 입력" });
    }
  });

  let html = '<div style="font-weight:700;color:var(--ink);font-size:14px;margin-bottom:8px">📊 추정 결과</div>';
  results.forEach(item => {
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--line)">' +
      '<span style="color:var(--ink);font-size:14px">' + esc(item.name) +
      '<span style="display:block;color:var(--muted);font-size:11px">' + esc(item.note) + '</span></span>' +
      (item.kcal !== null
        ? '<span style="font-weight:700;color:var(--accent);white-space:nowrap">' + item.kcal.toLocaleString() + ' kcal</span>'
        : '<span style="color:var(--faint);font-size:12px">?</span>') +
      '</div>';
  });
  if (total > 0) {
    html += '<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:15px;font-weight:800;color:var(--ink)">' +
      '<span>합계</span><span style="color:var(--accent)">' + total.toLocaleString() + ' kcal</span></div>';
    html += '<button onclick="applyEstimate(' + total + ')" style="width:100%;margin-top:10px;padding:10px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:800;">이 값으로 입력하기</button>';
  }
  resultBox.innerHTML = html;
  resultBox.style.display = "block";
  btn.disabled = false;
  btn.innerHTML = '✨ 칼로리 추정하기';
}

function applyEstimate(kcal) {
  const inp = document.getElementById("f-kcal");
  if (inp) inp.value = kcal;
}

async function saveMeetDate() {
  const d = document.getElementById("meet-date").value;
  if (currentSeasonId === "default") {
    await dbPut("meetDate", d);
    seasons._defaultMeetDate = d;
  } else {
    await dbPut("seasons/" + currentSeasonId + "/meetDate", d);
    if (seasons[currentSeasonId]) seasons[currentSeasonId].meetDate = d;
  }
  closeModal();
  await loadAll(); render();
}

async function confirmEndSeason() {
  if (!confirm("이 시즌을 종료할까요?\n명예의 전당에 결과가 저장돼요.")) return;
  closeModal();
  await endSeason();
}

async function endSeason() {
  // 명예의 전당 계산
  const hall = {};

  // MVP (기록일수 1위, 동점이면 칼로리 적은 사람)
  const mvpData = members.map(m => {
    const mEntries = entries.filter(e => e.member === m.name && e.calories > 0);
    const days = new Set(mEntries.map(e => e.date)).size;
    const kcal = mEntries.reduce((s, e) => s + e.calories, 0);
    return { name: m.name, days, kcal };
  }).filter(m => m.days > 0).sort((a,b) => b.days !== a.days ? b.days - a.days : a.kcal - b.kcal);
  if (mvpData.length) hall.mvp = { name: mvpData[0].name, days: mvpData[0].days };

  // 최장 스트릭
  const streakData = members.map(m => ({ name: m.name, streak: calcStreak(m.name) }))
    .sort((a,b) => b.streak - a.streak);
  if (streakData.length && streakData[0].streak > 0) hall.streak = { name: streakData[0].name, streak: streakData[0].streak };

  // 최다 기록일
  const recordData = members.map(m => ({
    name: m.name,
    days: new Set(entries.filter(e => e.member === m.name).map(e => e.date)).size
  })).sort((a,b) => b.days - a.days);
  if (recordData.length && recordData[0].days > 0) hall.record = { name: recordData[0].name, days: recordData[0].days };

  // Firebase에 저장
  if (currentSeasonId === "default") {
    await dbPut("hall", hall);
  } else {
    await dbPut("seasons/" + currentSeasonId + "/hall", hall);
    await dbPut("seasons/" + currentSeasonId + "/ended", true);
    if (seasons[currentSeasonId]) { seasons[currentSeasonId].ended = true; seasons[currentSeasonId].hall = hall; }
  }
  await loadAll(); render();
}

function switchSeason(id) {
  currentSeasonId = id;
  view = "all";
  members = []; entries = []; polls = {}; notices = {}; loaded = false;
  closeModal();
  start();
}

// ── 먹방왕 화면 ──
function renderMukbangHtml() {
  const wr = getWeekRange(new Date());
  let html = '<div class="list" style="padding-bottom:100px">';
  const weekData = members.map(m => {
    const wEntries = entries.filter(e => {
      const d = new Date(e.timestamp);
      return d >= wr.start && d <= wr.end && e.member === m.name;
    });
    const kcal = wEntries.reduce((s, e) => s + e.calories, 0);
    const days = new Set(wEntries.map(e => e.date)).size;
    return { name: m.name, kcal, days };
  }).filter(m => m.kcal > 0).sort((a, b) => b.kcal - a.kcal);
  if (weekData.length === 0) {
    html += '<div class="empty">이번 주 기록이 없어요.</div></div>';
    return html;
  }
  const medals = ['🥇','🥈','🥉'];
  const king = weekData[0];
  html += '<div class="card">';
  html += '<div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px">🍔 이번 주 먹방왕</div>';
  html += '<div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:14px;margin-bottom:16px">';
  html += '<span style="font-size:32px">🍔</span>';
  html += '<div style="flex:1">';
  html += '<div style="font-size:17px;font-weight:800">' + esc(king.name) + ' 👑</div>';
  html += '<div style="font-size:13px;color:var(--muted);margin-top:2px">이번 주 ' + king.kcal.toLocaleString() + ' kcal · ' + king.days + '일 기록</div>';
  html += '</div></div>';
  html += '<div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px">이번 주 칼로리 순위</div>';
  html += '<div style="display:flex;flex-direction:column;gap:10px">';
  weekData.forEach((m, i) => {
    const pct = Math.round(m.kcal / weekData[0].kcal * 100);
    const medal = medals[i] || (i + 1) + '위';
    html += '<div>';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">' +
      '<span style="font-size:14px;font-weight:700">' + medal + ' ' + esc(m.name) + '</span>' +
      '<span style="font-size:13px;font-weight:700;color:var(--muted)">' + m.kcal.toLocaleString() + ' kcal</span></div>';
    html += '<div style="height:7px;background:var(--bg);border-radius:99px;overflow:hidden">' +
      '<div style="height:100%;width:' + pct + '%;background:' + (i === 0 ? '#E0726A' : colorOf(m.name)) + ';border-radius:99px"></div></div>';
    html += '</div>';
  });
  html += '</div></div>';
  const foodCount = {};
  entries.filter(e => {
    const d = new Date(e.timestamp);
    return d >= wr.start && d <= wr.end;
  }).forEach(e => {
    const key = e.food.split('\n')[0].trim();
    if (!foodCount[key]) foodCount[key] = { count: 0 };
    foodCount[key].count++;
  });
  const topFoods = Object.entries(foodCount).sort((a,b) => b[1].count - a[1].count).slice(0, 5);
  if (topFoods.length > 0) {
    html += '<div class="card" style="margin-top:0">';
    html += '<div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px">🍽️ 이번 주 자주 먹은 음식 TOP' + topFoods.length + '</div>';
    html += '<div style="display:flex;flex-direction:column;gap:8px">';
    topFoods.forEach(([food, data], i) => {
      html += '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<span style="font-size:14px;font-weight:700">' + (i+1) + '. ' + esc(food) + '</span>' +
        '<span style="font-size:13px;color:var(--muted);font-weight:700">' + data.count + '회</span></div>';
    });
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

async function castVote(pollId, optId) {
  if (view === "all") { alert("멤버를 선택한 뒤 투표해주세요!"); return; }
  const poll = polls[pollId];
  if (!poll) return;
  const opt = poll.options[optId];
  if (!opt) return;
  if (!opt.voters) opt.voters = {};
  if (opt.voters[view]) {
    delete opt.voters[view]; // 취소
  } else {
    opt.voters[view] = true;
  }
  await dbPut(seasonPath("polls") + "/" + pollId + "/options/" + optId + "/voters", opt.voters);
  await loadAll(); render();
}

// ── 스트릭 계산 ──
function calcStreak(memberName) {
  const dates = [...new Set(
    entries.filter(e => e.member === memberName).map(e => e.date)
  )].sort().reverse();
  if (!dates.length) return 0;
  const today = fmtKey(new Date());
  const yesterday = fmtKey(new Date(Date.now() - 86400000));
  // 오늘 또는 어제 기록이 없으면 스트릭 0
  if (dates[0] !== today && dates[0] !== yesterday) return 0;
  let streak = 1;
  for (let i = 1; i < dates.length; i++) {
    const prev = new Date(dates[i-1]);
    const curr = new Date(dates[i]);
    const diff = (prev - curr) / 86400000;
    if (diff === 1) streak++;
    else break;
  }
  return streak;
}

function calcStreakAt(memberName, baseDate) {
  const dates = [...new Set(
    entries.filter(e => e.member === memberName).map(e => e.date)
  )].sort().reverse();
  if (!dates.length || !dates.includes(baseDate)) return 0;
  const idx = dates.indexOf(baseDate);
  let streak = 1;
  for (let i = idx + 1; i < dates.length; i++) {
    const prev = new Date(dates[i-1]);
    const curr = new Date(dates[i]);
    const diff = (prev - curr) / 86400000;
    if (diff === 1) streak++;
    else break;
  }
  return streak;
}
